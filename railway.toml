[build]
builder = "RAILPACK"
buildCommand = "cd frontend && npm ci && npm run build && cd ../backend && bun install --frozen-lockfile && rm -rf public && cp -r ../frontend/dist public"

[deploy]
startCommand = "cd backend && bun run start"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
