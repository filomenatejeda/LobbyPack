[build]
builder = "RAILPACK"
buildCommand = "cd frontend && npm ci --prefer-offline --no-audit --no-fund && npm run build && cd ../backend && bun install --frozen-lockfile"

[deploy]
startCommand = "cd backend && bun run start"
healthcheckPath = "/ready"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
