services:
  mysql_lobbypack:
    image: mysql:8
    container_name: db-lobbypack
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "${MYSQL_LOCAL_PORT}:${MYSQL_DOCKER_PORT}"
    volumes:
      - lobbypack-mysql:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: lobbypack-backend
    depends_on:
      mysql_lobbypack:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: ${BACKEND_DOCKER_PORT}
      MYSQL_HOST: ${DB_HOST}
      MYSQL_PORT: ${MYSQL_DOCKER_PORT}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_DB: ${DB_NAME}
      CORS_ORIGIN: http://localhost:${VITE_LOCAL_PORT},http://frontend:${VITE_DOCKER_PORT}
    ports:
      - "${BACKEND_LOCAL_PORT}:${BACKEND_DOCKER_PORT}"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lobbypack-frontend
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_LOCAL_PORT}
    ports:
      - "${VITE_LOCAL_PORT}:${VITE_DOCKER_PORT}"

volumes:
  lobbypack-mysql:
