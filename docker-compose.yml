services:
  mysql_lobbypack:
    image: mysql:8
    container_name: db-lobbypack
    restart: always 
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: $DB_PASSWORD
      MYSQL_DATABASE: $DB_NAME
    ports:
      - "$MYSQL_LOCAL_PORT:$MYSQL_DOCKER_PORT"
    volumes:
      - lobbypack-mysql:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend-frontend:
    build: .
    container_name: lobbypack-backend-frontend
    depends_on:
      - mysql_lobbypack
    links:
      - mysql_lobbypack
    env_file:
      - .env
    ports:
      - $VITE_LOCAL_PORT:$VITE_DOCKER_PORT
    working_dir: /app-lobbypack
    # volumes:
    #   - ./:/app-lobbypack
    environment:
      MYSQL_HOST: $DB_HOST
      MYSQL_USER: $DB_USER
      MYSQL_PASSWORD: $DB_PASSWORD
      MYSQL_DB: $DB_NAME

